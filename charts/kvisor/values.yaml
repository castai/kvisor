# Default values for egressd.
# Declare variables to be passed into your templates.

# CAST AI API configuration.
castai:
  enabled: true

  # Token to be used for authorizing agent access to the CASTAI API
  apiKey: ""

  # Name of secret with Token to be used for authorizing agent access to the API
  # apiKey and apiKeySecretRef are mutually exclusive
  # The referenced secret must provide the token in .data["API_KEY"]
  apiKeySecretRef: ""

  # CASTAI grpc public api address.
  # Note: If your cluster is in the EU region, update the grpcAddr to: https://kvisor.prod-eu.cast.ai:443
  grpcAddr: "kvisor.prod-master.cast.ai:443"

  apiURL: ""

  # Organization ID — used by the ClickHouse exporter and silver table MVs.
  orgID: ""

  # clusterID, clusterIdConfigMapKeyRef and clusterIdSecretKeyRef are mutually exclusive
  clusterID: ""
  # clusterIdConfigMapKeyRef -- Name and Key of configMap with ClusterID
  # The referenced configMap must provide the ClusterID in .data[<<.Values.castai.clusterIdConfigMapKeyRef.key>>]
  clusterIdConfigMapKeyRef:
    name: ""
    key: "CLUSTER_ID"
  # clusterIdSecretKeyRef -- Name and Key of secret with ClusterID
  # The referenced secret must provide the ClusterID in .data[<<.Values.castai.clusterIdSecretKeyRef.key>>]
  clusterIdSecretKeyRef:
    name: ""
    key: "CLUSTER_ID"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Labels to add to all resources.
# TODO: Add for all resources
commonLabels: {}

# Annotations to add to all resources.
# TODO: Add for all resources
commonAnnotations: {}

image:
  repository: ghcr.io/castai/kvisor/kvisor
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

pyroscope:
  enabled: false

agent:
  enabled: true

  # -- Used to set additional volumes.
  extraVolumes: []

  # -- Used to set additional volume mounts.
  extraVolumeMounts: []

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

  # Specifies whether the service account token should be automounted.
  automountServiceAccountToken: false

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 10

  # Allow to set priority class like system-node-critical.
  priorityClass: "system-node-critical"

  podAnnotations: {}

  podLabels: {}

  securityContext: {}

  containerSecurityContext:
    privileged: false
    runAsNonRoot: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
      # If empty, capabilities are added dynamically based on enabled features (see _helpers.tpl)
      # Set explicitly to override the dynamic behavior
      add: []
    seccompProfile:
      type: Unconfined
    appArmorProfile:
      type: Unconfined
    seLinuxOptions:
      level: s0
      type: spc_t
    readOnlyRootFilesystem: true

  resources:
    requests:
      memory: 64Mi
    limits:
      memory: 512Mi

  nodeSelector: {}

  tolerations:
    - effect: NoSchedule
      operator: Exists
    - effect: NoExecute
      operator: Exists

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: eks.amazonaws.com/compute-type
                operator: NotIn
                values:
                  - fargate
              - key: kubernetes.io/os
                operator: NotIn
                values:
                  - windows

  dnsPolicy: ClusterFirstWithHostNet

  metricsHTTPListenPort: 6060

  # Extra args for egressd collector container.
  extraArgs:
    log-level: info
    #pyroscope-addr: http://kvisord-pyroscope:4040

  prometheusScrape:
    enabled: true

  debug:
    ebpf: false

  # Additional environment variables for the agent container.
  additionalEnv: {}

  # Additional environment variables for the agent container via configMaps or secrets.
  envFrom: []

  # Path to the container runtime socket (containerd or CRI-O)
  containerdSocketPath: "/run/containerd/containerd.sock"

  # Disable containerd-specific features (process tree, image digest resolution).
  # Set to true for CRI-O clusters.
  disableContainerd: false

  openshift:
    scc:
      create: false

  # GPU metrics collection via DCGM exporter.
  # When enabled, an init container discovers any existing DCGM exporter in the cluster
  # and a DCGM sidecar is added to the pod. If an existing DCGM is found, the sidecar
  # sleeps (avoiding exclusive GPU access conflicts). Otherwise the sidecar runs DCGM.
  gpu:
    enabled: false

    # Path to the emptyDir volume shared between the init container and main containers.
    sharedDir: "/shared"

    # How often GPU metrics are collected and exported.
    exportInterval: "15s"

    # DCGM exporter sidecar settings.
    dcgmExporter:
      image:
        repository: nvcr.io/nvidia/k8s/dcgm-exporter
        tag: "4.5.2-4.8.1-ubuntu22.04"
        pullPolicy: IfNotPresent
      # Port DCGM exporter listens on.
      port: 9400
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          memory: 500Mi

  # Reliability metrics collection via OBI (OpenTelemetry eBPF Instrumentation).
  # Deploys OBI as a sidecar container in the kvisor agent DaemonSet to collect
  # RED metrics (request rate, error rate, duration histograms) from customer workloads.
  # Memory usage scales with instrumented processes (~27 MiB per process).
  reliabilityMetrics:
    enabled: false

    # --- OBI (eBPF instrumentation) container settings ---
    obi:
      # Sizing profile for the OBI container.
      # Controls memory requests/limits based on expected workload density per node.
      # Run `./scripts/obi-sizing-report.sh` to determine the right profile for your cluster.
      #
      # Available profiles:
      #   small   — up to 5 services/node   (requests: 96Mi,  limits: 256Mi)
      #   medium  — 5–15 services/node      (requests: 192Mi, limits: 512Mi)
      #   large   — 15–30 services/node     (requests: 384Mi, limits: 768Mi)
      #   xlarge  — 30+ services/node        (requests: 512Mi, limits: 1Gi)
      #   custom  — use the 'resources' block below for manual sizing
      #
      # See docs/obi-sizing.md for the sizing guide.
      sizingProfile: "medium"

      # GOMEMLIMIT is always derived at runtime from the container's actual cgroup
      # memory limit (90% of the enforced limit). This ensures GOMEMLIMIT tracks
      # VPA adjustments and admission webhook mutations automatically.
      #
      # Dynamic sizing (optional): when enabled, an init container scans all network
      # namespaces on the node to count processes listening on openPorts. It logs the
      # recommended memory and warns at OBI startup if the container limit is too low.
      # Formula: memory = 40 + (N × 27) + 30 MiB  (clamped to [120, 1024] MiB)
      # Requires hostPID: true (already set on agent DaemonSet) and SYS_PTRACE.
      # See docs/obi-sizing.md for details.
      dynamicSizing: false

      image:
        repository: otel/ebpf-instrument
        tag: "v0.7.1"
      # Custom resources — only used when sizingProfile is "custom".
      resources:
        requests:
          memory: 192Mi
        limits:
          memory: 512Mi
      # Ports to instrument — controls memory usage (~27 MiB per instrumented process).
      # Comma-separated list. 8080=HTTP APIs, 8090=gRPC APIs, 6379=Redis.
      openPorts: "8080,8443,8090,6379"
      # Service discovery exclusions — reduces instrumented process count and memory.
      # OBI has built-in defaults (excludes kube-system, cert-manager, etc.) which
      # are preserved unless you set excludeDefaults: false.
      # Each entry can use: exe_path, k8s_namespace, open_ports, container_name,
      #   k8s_pod_labels, k8s_pod_annotations, cmd_args (glob patterns supported).
      # See: https://opentelemetry.io/docs/zero-code/obi/configure/service-discovery/
      exclude: []
        # Examples:
        # - k8s_namespace: "monitoring"
        # - exe_path: "*nginx*"
        # - exe_path: "*rollouts-controller*"
        # - open_ports: "9090,9091"
      # Exclude profiler agent processes (parca, pyroscope, grafana-agent, alloy)
      # from being instrumented. Prevents their outbound scrape calls from appearing
      # in RED metrics.
      excludeProfilerEndpoints: true
      # URL paths to exclude from metrics and traces. Matching requests are silently
      # dropped by OBI before export. Uses glob patterns with * wildcard.
      # Default routes below cover common infrastructure endpoints that generate noise
      # in application RED metrics without providing useful signal. Profiling/debug paths
      # (/debug/pprof/*) are handled separately by excludeProfilerEndpoints.
      # See: https://opentelemetry.io/docs/zero-code/obi/configure/routes-decorator/
      ignoredRoutes:
        # ── Health / readiness probes ──
        - /health
        - /health/*
        - /healthz
        - /readyz
        - /livez
        - /ready
        - /up
        - /ping
        # ── Prometheus / metrics endpoints ──
        - /metrics
        - /metrics/*
        # ── Spring Boot actuator ──
        - /actuator/*
        # ── Profiling / debug ──
        - /debug/*
        - /debug/pprof/*
        # ── JVM management (Jolokia) ──
        - /jolokia
        - /jolokia/*
        # Additional examples:
        # - /status
        # - /version
        # - /internal/*
      # Extra environment variables for the OBI container.
      env:
        # Disable tracing - we only need metrics
        OTEL_TRACES_SAMPLER: "always_off"
        OTEL_EBPF_TRACE_PRINTER: "disabled"
        # Internal Go channel buffer (default 10). 50 provides headroom for
        # burst absorption without the excessive memory overhead of 500.
        OTEL_EBPF_CHANNEL_BUFFER_LEN: "50"
        # Reduce metrics export interval from default 60s to 15s.
        # Flushes histogram aggregations 4x more often, reducing backpressure
        # on the spanNameAggregatedMetrics pipeline stage.
        OTEL_EBPF_METRICS_INTERVAL: "15s"
        # Batch 10 eBPF events per wakeup instead of waking Go per-event.
        # Reduces GC pressure from per-event allocations while keeping
        # latency low for metrics (sub-second batching at typical rates).
        OTEL_EBPF_BPF_WAKEUP_LEN: "10"
        # Restrict Kubernetes informer to pods on the local node only.
        # As a DaemonSet sidecar, OBI doesn't need cluster-wide pod/node/service
        # metadata. Saves ~30-100 MiB by not caching remote objects.
        OTEL_EBPF_KUBE_META_RESTRICT_LOCAL_NODE: "true"
        # Disable node and service informers — their metadata is not used by the
        # reliability metrics pipeline. All required attributes (workload name,
        # namespace, node name) come from the pod informer's owner references
        # and spec.nodeName.
        OTEL_EBPF_KUBE_DISABLE_INFORMERS: "node,service"
        # Timeout for HTTP request completion. Requests open beyond this duration
        # are forcibly closed by eBPF and reported with their current state.
        # Default 30s prevents long-lived connections (SSE, WebSocket upgrades,
        # streaming) from accumulating as open spans and inflating memory.
        OTEL_EBPF_BPF_HTTP_REQUEST_TIMEOUT: "30s"
        # Enable high-request-volume mode. Uses ring-buffer instead of perf-buffer
        # for eBPF→userspace event delivery, reducing per-event overhead at the
        # cost of slightly higher baseline memory. Recommended for clusters with
        # high-throughput services (>1k req/s per node).
        OTEL_EBPF_BPF_HIGH_REQUEST_VOLUME: "true"
      # Container security context override (if empty, uses unprivileged defaults with fine-grained capabilities).
      containerSecurityContext: {}
      # Internal metrics — exposes OBI's own health via a Prometheus endpoint.
      # Metrics include: instrumented process count, eBPF map usage, Go runtime stats.
      # Disabled by default. Set port > 0 to enable.
      internalMetrics:
        enabled: false
        port: 6061
        path: "/internal/metrics"
        # PodMonitor for Prometheus Operator — scrapes OBI internal metrics.
        podMonitor:
          enabled: false
          labels: {}
          interval: 30s
          scrapeTimeout: 10s

    # --- OTel Collector sidecar settings ---
    # Receives OTLP from OBI, applies golden signal filtering, cardinality control,
    # and batching, then exports to ClickHouse.
    # The pipeline config is compiled into the collector binary (no ConfigMap needed).
    # Bumping the image tag = changing the pipeline behavior.
    collector:
      enabled: true
      image:
        repository: us-docker.pkg.dev/castai-hub/library/reliability-metrics-otel-collector
        tag: "v0.1.11"
      resources:
        requests:
          memory: 128Mi
        limits:
          memory: 256Mi
      # Port for the collector's Prometheus exporter (scraped by cluster Prometheus).
      prometheusPort: 9400
      # ClickHouse exporter for reliability scoring pipeline.
      clickhouseExporter:
        enabled: true
        address: "tcp://castai-kvisor-clickhouse.castai-agent.svc.cluster.local:9000"
      # PodMonitor for Prometheus Operator — scrapes collector self-metrics (port 8888).
      # Provides: otelcol_receiver_accepted_metric_points, otelcol_exporter_sent_metric_points,
      # otelcol_processor_dropped_metric_points, queue sizes, Go runtime metrics.
      podMonitor:
        enabled: false
        # Extra labels on the PodMonitor metadata (for Prometheus Operator selector filtering).
        labels: {}
        interval: 30s
        scrapeTimeout: 10s

controller:
  enabled: true

  # -- Used to set additional volumes.
  extraVolumes: []

  # -- Used to set additional volume mounts.
  extraVolumeMounts: []

  replicas: 1

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

  podAnnotations: {}

  podLabels: {}

  # Allow to set priority class like system-cluster-critical.
  priorityClass: "system-cluster-critical"

  # TODO(Kvisord): Add default strict security context for all components.
  securityContext:
    fsGroup: 1001
    runAsNonRoot: true
  #    fsGroup: 10001
  #    runAsGroup: 10001
  #    runAsUser: 10001
  #    seccompProfile:
  #      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
  #    capabilities:
  #      drop: [ ALL ]

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 512Mi

  nodeSelector: {}

  tolerations: []

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: NotIn
                values:
                  - windows

  dnsPolicy: ClusterFirst

  httpListenPort: 8080
  kubeAPIListenPort: 8090
  metricsHTTPListenPort: 6060

  # Extra args for server container.
  extraArgs:
    log-level: info
    #pyroscope-addr: http://kvisord-pyroscope.kvisord-trace:4040

  netflow:
    # Static CIDR to zone/region/service mappings (optional)
    # Use this to manually specify network destinations without cloud API discovery.
    # The ConfigMap is only created when mappings is non-empty.
    #
    # connectivityMethod is optional and free-form — it can be empty or any custom string.
    # kvisor does not validate this field; it is forwarded as-is in netflow records for
    # downstream cost attribution. Well-known values for AWS:
    #   VPCPeering      — VPC Peering
    #   TransitGateway  — AWS Transit Gateway
    #   PrivateLink     — AWS PrivateLink / VPC Endpoints
    #   DirectConnect   — AWS Direct Connect
    #   SiteToSiteVPN   — AWS Site-to-Site VPN
    #   NATGateway      — NAT Gateway
    #   IntraVPC        — Same VPC
    staticCIDRs:
      mappings: []
      # Examples:
      # mappings:
      #   # Cross-account AWS VPC via Transit Gateway
      #   - cidr: "10.1.0.0/24"
      #     zone: "us-east-1a"      # Zone name, or zone ID (e.g., "use1-az1") when cloud-provider-aws-use-zone-id is enabled
      #     region: "us-east-1"
      #     name: "production-vpc"
      #     kind: "VPC"
      #     connectivityMethod: "TransitGateway"
      #
      #   # Single IP — overrides broader cloud-discovered CIDRs
      #   - cidr: "10.0.0.13/32"
      #     zone: "us-east-1a"
      #     region: "us-east-1"
      #     name: "production-rds"
      #     kind: "RDS"
      #     connectivityMethod: "PrivateLink"
      #
      #   # Regional subnet (no zone)
      #   - cidr: "10.2.0.0/16"
      #     zone: ""
      #     region: "us-east-1"
      #     name: "peered-vpc"
      #     kind: "VPC"
      #     connectivityMethod: "VPCPeering"

  prometheusScrape:
    enabled: true

  # Additional environment variables for the controller container.
  additionalEnv: {}

  # Additional environment variables for the controller container via configMaps or secrets.
  envFrom: []

  # Deprecated: use additionalEnv instead.
  extraEnv: {}

  # --- K8s cluster state metrics (reliability) ---
  # Runs an OTel Collector sidecar with k8s_cluster receiver to collect
  # KSM-equivalent infrastructure metrics (pod restarts, deployment availability,
  # node conditions, resource requests/limits). No OBI needed — purely API server watch-based.
  # Pipeline config is compiled into the collector binary (no ConfigMap needed).
  reliabilityMetrics:
    enabled: false
    collector:
      enabled: true
      image:
        repository: us-docker.pkg.dev/castai-hub/library/reliability-metrics-otel-collector
        tag: "v0.1.11"
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          memory: 512Mi
      # ClickHouse exporter — mirrors agent collector pattern.
      clickhouseExporter:
        enabled: true
        address: "tcp://castai-kvisor-clickhouse.castai-agent.svc.cluster.local:9000"
      # Port for the collector's Prometheus exporter (different from agent collector's 9400).
      prometheusPort: 9401
      # PodMonitor for Prometheus Operator — scrapes collector self-metrics (port 8888).
      podMonitor:
        enabled: false
        # Extra labels on the PodMonitor metadata (for Prometheus Operator selector filtering).
        labels: {}
        interval: 30s
        scrapeTimeout: 10s

eventGenerator:
  enabled: false
  image:
    repository: ghcr.io/castai/kvisor/kvisor-event-generator
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""

  dnsPolicy: ClusterFirst

  extraArgs:
    log-level: debug

  tolerations:
    - effect: NoSchedule
      operator: Exists
    - effect: NoExecute
      operator: Exists

mockServer:
  enabled: false

# ─────────────────────────────────────────────────────────────────────────────
# ClickHouse (for netflow export - legacy single-node deployment)
# ─────────────────────────────────────────────────────────────────────────────
# DEPRECATED: This is the legacy ClickHouse deployment for netflow export only.
# For reliability metrics, use the reliabilityMetrics section below which deploys
# a managed ClickHouse instance via the reliability-metrics-ch-exporter subchart.
clickhouse:
  enabled: false

  auth:
    database: "metrics"
    username: "kvisor"
    password: "kvisor"

  image:
    repository: clickhouse/clickhouse-server
    pullPolicy: IfNotPresent
    tag: "25.2.1.3085-alpine@sha256:49e2bbe28760d0af142096d837ca2337b0265c910a07504a3175fc9326965bd7"

  nodeSelector: {}
  tolerations: []
  affinity: {}
  dnsPolicy: ClusterFirst
  persistentVolume:
    size: 20Gi
    #storageClass: premium-rwo

# ─────────────────────────────────────────────────────────────────────────────
# Reliability Metrics (subchart: reliability-metrics-ch-exporter)
# ─────────────────────────────────────────────────────────────────────────────
# All ClickHouse infrastructure (deployment, schema migrations, exporter) is
# managed by the reliability-metrics-ch-exporter subchart (alias: reliabilityMetrics).
# Values under this key are passed through to the subchart.
# See the subchart's values.yaml for all available options.
reliabilityMetrics:
  enabled: false
  castai:
    apiKeySecretRef: "castai-kvisor" # Read API key from castai-kvisor Secret
    clusterIdConfigMapRef:
      name: "castai-agent-metadata" # Read cluster ID from castai-agent-metadata ConfigMap
      key: "CLUSTER_ID"
    # gRPC address for the telemetry server (ch-exporter → mothership).
    # The kvisor agent auto-derives telemetry.* from castai.grpcAddr, but the
    # ch-exporter subchart has no such logic — it needs an explicit address.
    # Note: If your cluster is in the EU region, use: "telemetry.prod-eu.cast.ai:443"
    grpcAddr: "telemetry.prod-master.cast.ai:443"
    # Note: If your cluster is in the EU region, use: "https://api.eu.cast.ai"
    apiURL: "https://api.cast.ai"

  # ClickHouse authentication credentials
  # Can be plain values OR valueFrom references (secretKeyRef/configMapKeyRef)
  # See subchart documentation for valueFrom examples
  auth:
    database: "metrics"
    username: "kvisor"
    password: "kvisor"
  exporter:
    image:
      repository: us-docker.pkg.dev/castai-hub/library/reliability-metrics-ch-exporter
      tag: "v0.3.17"
