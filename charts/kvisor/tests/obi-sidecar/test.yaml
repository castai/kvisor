suite: obi sidecar tests
templates:
  - agent.yaml
  - secret.yaml
values:
  - values.yaml
tests:
  # --- OBI disabled ---
  - it: should not have obi container when reliabilityMetrics is disabled
    set:
      agent.reliabilityMetrics.enabled: false
    asserts:
      - isKind:
          of: DaemonSet
        template: agent.yaml
        documentIndex: 0
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1
        template: agent.yaml
        documentIndex: 0

  # --- OBI + Collector enabled (default) ---
  - it: should have 3 containers when reliabilityMetrics and collector are enabled
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 3
        template: agent.yaml
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].name
          value: kvisor
        template: agent.yaml
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[1].name
          value: obi
        template: agent.yaml
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[2].name
          value: otel-collector
        template: agent.yaml
        documentIndex: 0

  - it: should use correct OBI image
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[1].image
          pattern: "otel/ebpf-instrument:v0.6.0"
        template: agent.yaml
        documentIndex: 0

  - it: should use correct collector image
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[2].image
          pattern: "reliability-metrics-otel-collector:v0.1.2"
        template: agent.yaml
        documentIndex: 0

  - it: should configure open ports including gRPC and Redis
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.openPorts: "8080,8090,6379"
    asserts:
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: OTEL_EBPF_OPEN_PORT
            value: "8080,8090,6379"
        template: agent.yaml
        documentIndex: 0

  - it: should point OBI to localhost collector via gRPC when collector enabled
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "http://localhost:4317"
        template: agent.yaml
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: OTEL_EXPORTER_OTLP_PROTOCOL
            value: "grpc"
        template: agent.yaml
        documentIndex: 0

  - it: should enable kubernetes metadata autodetect
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: OTEL_EBPF_KUBE_METADATA_ENABLE
            value: "autodetect"
        template: agent.yaml
        documentIndex: 0

  - it: should set obi security context with required eBPF capabilities
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[1].securityContext.runAsUser
          value: 0
        template: agent.yaml
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[1].securityContext.capabilities.add
          content: BPF
        template: agent.yaml
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[1].securityContext.capabilities.add
          content: SYS_ADMIN
        template: agent.yaml
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[1].securityContext.capabilities.add
          content: SYS_PTRACE
        template: agent.yaml
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[1].securityContext.capabilities.add
          content: PERFMON
        template: agent.yaml
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[1].securityContext.capabilities.drop
          content: ALL
        template: agent.yaml
        documentIndex: 0

  - it: should set collector security context without any capabilities
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[2].securityContext.runAsUser
          value: 0
        template: agent.yaml
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[2].securityContext.readOnlyRootFilesystem
          value: true
        template: agent.yaml
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[2].securityContext.capabilities.drop
          content: ALL
        template: agent.yaml
        documentIndex: 0

  - it: should use custom obi security context when provided
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.containerSecurityContext:
        privileged: true
    asserts:
      - equal:
          path: spec.template.spec.containers[1].securityContext.privileged
          value: true
        template: agent.yaml
        documentIndex: 0

  - it: should add var-run-obi volume when enabled
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: var-run-obi
            emptyDir: {}
        template: agent.yaml
        documentIndex: 0

  - it: should add projected SA token volume for OBI K8s metadata
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: obi-sa-token
            projected:
              sources:
                - serviceAccountToken:
                    expirationSeconds: 3600
                    path: token
                - configMap:
                    name: kube-root-ca.crt
                    items:
                      - key: ca.crt
                        path: ca.crt
                - downwardAPI:
                    items:
                      - path: namespace
                        fieldRef:
                          fieldPath: metadata.namespace
        template: agent.yaml
        documentIndex: 0

  - it: should mount SA token in obi container for K8s API access
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[1].volumeMounts
          content:
            name: obi-sa-token
            mountPath: /var/run/secrets/kubernetes.io/serviceaccount
            readOnly: true
        template: agent.yaml
        documentIndex: 0

  # --- Sizing Profiles ---
  - it: should use medium profile resources by default
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[1].resources.requests.memory
          value: 192Mi
        template: agent.yaml
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[1].resources.limits.memory
          value: 512Mi
        template: agent.yaml
        documentIndex: 0

  - it: should use small profile resources
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.sizingProfile: small
    asserts:
      - equal:
          path: spec.template.spec.containers[1].resources.requests.memory
          value: 96Mi
        template: agent.yaml
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[1].resources.limits.memory
          value: 256Mi
        template: agent.yaml
        documentIndex: 0

  - it: should use large profile resources
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.sizingProfile: large
    asserts:
      - equal:
          path: spec.template.spec.containers[1].resources.requests.memory
          value: 384Mi
        template: agent.yaml
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[1].resources.limits.memory
          value: 768Mi
        template: agent.yaml
        documentIndex: 0

  - it: should use xlarge profile resources
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.sizingProfile: xlarge
    asserts:
      - equal:
          path: spec.template.spec.containers[1].resources.requests.memory
          value: 512Mi
        template: agent.yaml
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[1].resources.limits.memory
          value: 1Gi
        template: agent.yaml
        documentIndex: 0

  - it: should use custom resources when sizingProfile is custom
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.sizingProfile: custom
      agent.reliabilityMetrics.obi.resources:
        requests:
          memory: 256Mi
        limits:
          memory: 1Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[1].resources.requests.memory
          value: 256Mi
        template: agent.yaml
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[1].resources.limits.memory
          value: 1Gi
        template: agent.yaml
        documentIndex: 0

  - it: should set collector resource limits
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[2].resources.limits.memory
          value: 256Mi
        template: agent.yaml
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[2].resources.requests.memory
          value: 128Mi
        template: agent.yaml
        documentIndex: 0

  - it: should expose prometheus, otlp-grpc, otlp-http, and telemetry ports on collector
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[2].ports
          content:
            containerPort: 9400
            name: otel-prom
            protocol: TCP
        template: agent.yaml
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[2].ports
          content:
            containerPort: 4317
            name: otlp-grpc
            protocol: TCP
        template: agent.yaml
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[2].ports
          content:
            containerPort: 4318
            name: otlp-http
            protocol: TCP
        template: agent.yaml
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[2].ports
          content:
            containerPort: 8888
            name: otel-metrics
            protocol: TCP
        template: agent.yaml
        documentIndex: 0

  - it: should add apparmor annotation for obi when enabled
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - isNotNull:
          path: spec.template.metadata.annotations["container.apparmor.security.beta.kubernetes.io/obi"]
        template: agent.yaml
        documentIndex: 0
      - equal:
          path: spec.template.metadata.annotations["container.apparmor.security.beta.kubernetes.io/obi"]
          value: unconfined
        template: agent.yaml
        documentIndex: 0

  - it: should not have custom prometheus scrape-obi annotations
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - isNull:
          path: spec.template.metadata.annotations["prometheus.io/scrape-obi"]
        template: agent.yaml
        documentIndex: 0
      - isNull:
          path: spec.template.metadata.annotations["prometheus.io/port-obi"]
        template: agent.yaml
        documentIndex: 0

  - it: should add extra env vars to obi container
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.env:
        OTEL_EBPF_LOG_LEVEL: debug
    asserts:
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: OTEL_EBPF_LOG_LEVEL
            value: "debug"
        template: agent.yaml
        documentIndex: 0

  - it: should not affect kvisor container when obi is enabled
    set:
      agent.reliabilityMetrics.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: kvisor
        template: agent.yaml
        documentIndex: 0

  # --- Dynamic Sizing (Phase 1) ---
  - it: should not have init container when dynamicSizing is disabled
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.dynamicSizing: false
    asserts:
      - isNull:
          path: spec.template.spec.initContainers
        template: agent.yaml
        documentIndex: 0

  - it: should have obi-sizer init container when dynamicSizing is enabled
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.dynamicSizing: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 1
        template: agent.yaml
        documentIndex: 0
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: obi-sizer
        template: agent.yaml
        documentIndex: 0
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "busybox:1.37.0-musl"
        template: agent.yaml
        documentIndex: 0

  - it: should have SYS_PTRACE capability on init container
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.dynamicSizing: true
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].securityContext.capabilities.add
          content: SYS_PTRACE
        template: agent.yaml
        documentIndex: 0
      - contains:
          path: spec.template.spec.initContainers[0].securityContext.capabilities.drop
          content: ALL
        template: agent.yaml
        documentIndex: 0

  - it: should add obi-shared volume when dynamicSizing is enabled
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.dynamicSizing: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: obi-shared
            emptyDir:
              sizeLimit: 2Mi
        template: agent.yaml
        documentIndex: 0

  - it: should not add obi-shared volume when dynamicSizing is disabled
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.dynamicSizing: false
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: obi-shared
            emptyDir:
              sizeLimit: 2Mi
        template: agent.yaml
        documentIndex: 0

  - it: should mount obi-shared volume in obi container when dynamicSizing is enabled
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.dynamicSizing: true
    asserts:
      - contains:
          path: spec.template.spec.containers[1].volumeMounts
          content:
            name: obi-shared
            mountPath: /shared
            readOnly: true
        template: agent.yaml
        documentIndex: 0

  - it: should use wrapper command on obi container when dynamicSizing is enabled
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.dynamicSizing: true
    asserts:
      - equal:
          path: spec.template.spec.containers[1].command
          value: ["/shared/entrypoint.sh"]
        template: agent.yaml
        documentIndex: 0

  - it: should not override obi command when dynamicSizing is disabled
    set:
      agent.reliabilityMetrics.enabled: true
      agent.reliabilityMetrics.obi.dynamicSizing: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[1].command
        template: agent.yaml
        documentIndex: 0

  - it: should not have init container when reliabilityMetrics is disabled even if dynamicSizing is true
    set:
      agent.reliabilityMetrics.enabled: false
      agent.reliabilityMetrics.obi.dynamicSizing: true
    asserts:
      - isNull:
          path: spec.template.spec.initContainers
        template: agent.yaml
        documentIndex: 0
