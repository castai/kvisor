{{- if and .Values.castai.enabled .Values.castai.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kvisor.labels" . | nindent 4 }}
data:
  API_KEY: {{ .Values.castai.apiKey | b64enc | quote }}
{{- end }}
---
{{/*
OTel Collector ClickHouse credentials secret.
Created when ClickHouse exporter is enabled for agent or controller reliability metrics.
*/}}
{{- $agentClickhouse := dig "reliabilityMetrics" "collector" "clickhouseExporter" "enabled" false .Values.agent }}
{{- $controllerClickhouse := dig "reliabilityMetrics" "collector" "clickhouseExporter" "enabled" false .Values.controller }}
{{- if or $agentClickhouse $controllerClickhouse }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kvisor.fullname" . }}-otel-clickhouse-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kvisor.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ include "kvisor.clickhouse.username" . | quote }}
  password: {{ include "kvisor.clickhouse.password" . | quote }}
{{- end }}
