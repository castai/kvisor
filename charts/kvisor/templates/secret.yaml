{{- if and .Values.castai.enabled .Values.castai.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kvisor.labels" . | nindent 4 }}
data:
  API_KEY: {{ .Values.castai.apiKey | b64enc | quote }}
{{- end }}
{{/*
OTel Collector ClickHouse credentials are now managed by the
reliability-metrics-ch-exporter subchart (alias: clickhouse).
See credentials-secret.yaml in the subchart.
*/}}
