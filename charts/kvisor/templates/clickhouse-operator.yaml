{{/*
ClickHouse Operator (Altinity) and ClickHouseInstallation CR.
This template installs the Altinity ClickHouse operator and optionally creates
a single-node ClickHouseInstallation for in-cluster ClickHouse.
*/}}

{{- if (dig "operator" "enabled" false .Values.clickhouse) }}
---
# ─────────────────────────────────────────────────────────────────────────────
# ServiceAccount for ClickHouse Operator
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kvisor.fullname" . }}-clickhouse-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kvisor.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse-operator
---
# ─────────────────────────────────────────────────────────────────────────────
# ClusterRole for ClickHouse Operator
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kvisor.fullname" . }}-clickhouse-operator
  labels:
    {{- include "kvisor.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse-operator
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - services
      - persistentvolumeclaims
      - secrets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources:
      - endpoints
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - events
    verbs: ["create"]
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources:
      - statefulsets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources:
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["clickhouse.altinity.com"]
    resources:
      - clickhouseinstallations
      - clickhouseinstallationtemplates
      - clickhouseoperatorconfigurations
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["clickhouse.altinity.com"]
    resources:
      - clickhouseinstallations/status
      - clickhouseinstallationtemplates/status
      - clickhouseoperatorconfigurations/status
    verbs: ["get", "update", "patch"]
  - apiGroups: ["clickhouse.altinity.com"]
    resources:
      - clickhousekeeperinstallations
    verbs: ["get", "list", "watch"]
---
# ─────────────────────────────────────────────────────────────────────────────
# ClusterRoleBinding for ClickHouse Operator
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kvisor.fullname" . }}-clickhouse-operator
  labels:
    {{- include "kvisor.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kvisor.fullname" . }}-clickhouse-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "kvisor.fullname" . }}-clickhouse-operator
    namespace: {{ .Release.Namespace }}
---
# ─────────────────────────────────────────────────────────────────────────────
# ClickHouse Operator Deployment
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kvisor.fullname" . }}-clickhouse-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kvisor.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kvisor.fullname" . }}-clickhouse-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kvisor.fullname" . }}-clickhouse-operator
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: clickhouse-operator
        {{- include "kvisor.commonLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kvisor.fullname" . }}-clickhouse-operator
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: clickhouse-operator
          image: "{{ .Values.clickhouse.operator.image.repository }}:{{ .Values.clickhouse.operator.version }}"
          imagePullPolicy: {{ .Values.clickhouse.operator.image.pullPolicy }}
          args:
            - --config=/etc/clickhouse-operator/config.yaml
          env:
            - name: OPERATOR_POD_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: OPERATOR_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPERATOR_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OPERATOR_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: OPERATOR_POD_SERVICE_ACCOUNT
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
            - name: OPERATOR_CONTAINER_CPU_REQUEST
              valueFrom:
                resourceFieldRef:
                  containerName: clickhouse-operator
                  resource: requests.cpu
            - name: OPERATOR_CONTAINER_CPU_LIMIT
              valueFrom:
                resourceFieldRef:
                  containerName: clickhouse-operator
                  resource: limits.cpu
            - name: OPERATOR_CONTAINER_MEM_REQUEST
              valueFrom:
                resourceFieldRef:
                  containerName: clickhouse-operator
                  resource: requests.memory
            - name: OPERATOR_CONTAINER_MEM_LIMIT
              valueFrom:
                resourceFieldRef:
                  containerName: clickhouse-operator
                  resource: limits.memory
            - name: WATCH_NAMESPACE
              value: {{ .Release.Namespace }}
          volumeMounts:
            - name: config
              mountPath: /etc/clickhouse-operator
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
        - name: metrics-exporter
          image: "{{ .Values.clickhouse.operator.metricsExporterImage.repository }}:{{ .Values.clickhouse.operator.version }}"
          imagePullPolicy: {{ .Values.clickhouse.operator.metricsExporterImage.pullPolicy }}
          args:
            - --config=/etc/clickhouse-operator/config.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/clickhouse-operator
          ports:
            - containerPort: 8888
              name: metrics
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: {{ include "kvisor.fullname" . }}-clickhouse-operator-config
---
# ─────────────────────────────────────────────────────────────────────────────
# ClickHouse Operator Configuration ConfigMap
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kvisor.fullname" . }}-clickhouse-operator-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kvisor.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse-operator
data:
  config.yaml: |
    logger:
      logtostderr: "true"
      v: "1"
    watch:
      namespaces:
        - {{ .Release.Namespace }}
    clickhouse:
      configuration:
        file:
          path:
            common: /etc/clickhouse-operator/conf.d/
    template:
      chi:
        policy: "auto"
  conf.d: ""
{{- end }}

{{/* ========================================================================= */}}
{{/* ClickHouseInstallation CR - Single node ClickHouse instance               */}}
{{/* ========================================================================= */}}
{{- if (dig "install" "enabled" false .Values.clickhouse) }}
---
# ─────────────────────────────────────────────────────────────────────────────
# ClickHouse credentials Secret
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kvisor.fullname" . }}-clickhouse-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kvisor.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
type: Opaque
stringData:
  username: {{ .Values.clickhouse.auth.username | quote }}
  password: {{ .Values.clickhouse.auth.password | quote }}
---
# ─────────────────────────────────────────────────────────────────────────────
# ClickHouseInstallation CR
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: {{ include "kvisor.fullname" . }}-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kvisor.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  defaults:
    templates:
      dataVolumeClaimTemplate: data-volume
      serviceTemplate: svc-template
  configuration:
    users:
      {{ .Values.clickhouse.auth.username }}/password_sha256_hex: {{ .Values.clickhouse.auth.password | sha256sum }}
      {{ .Values.clickhouse.auth.username }}/networks/ip: "::/0"
      {{ .Values.clickhouse.auth.username }}/profile: default
      {{ .Values.clickhouse.auth.username }}/quota: default
    profiles:
      default/async_insert: 1
      default/async_insert_max_data_size: 10000000
      default/async_insert_busy_timeout_ms: 5000
      default/wait_for_async_insert: 0
      # Required by the Altinity operator's injected clickhouse_operator user.
      clickhouse_operator/readonly: 0
    settings:
      logger/level: information
      logger/console: 1
      listen_host: "0.0.0.0"
      tcp_port: 9000
      http_port: 8123
      interserver_http_port: 9009
    files:
      disable_ssl.xml: |
        <clickhouse>
            <tcp_port_secure remove="true"/>
            <https_port remove="true"/>
            <mysql_port remove="true"/>
            <postgresql_port remove="true"/>
        </clickhouse>
    clusters:
      - name: otel
        layout:
          shardsCount: 1
          replicasCount: 1
        templates:
          podTemplate: pod-template
  templates:
    podTemplates:
      - name: pod-template
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: clickhouse
              image: "{{ .Values.clickhouse.install.image.repository }}:{{ .Values.clickhouse.install.image.tag }}"
              ports:
                - name: http
                  containerPort: 8123
                - name: native
                  containerPort: 9000
                - name: interserver
                  containerPort: 9009
              {{- with .Values.clickhouse.install.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
          {{- with .Values.clickhouse.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.clickhouse.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.clickhouse.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
    volumeClaimTemplates:
      - name: data-volume
        spec:
          accessModes:
            - ReadWriteOnce
          {{- if .Values.clickhouse.install.persistence.storageClass }}
          storageClassName: {{ .Values.clickhouse.install.persistence.storageClass | quote }}
          {{- end }}
          resources:
            requests:
              storage: {{ .Values.clickhouse.install.persistence.size }}
    serviceTemplates:
      - name: svc-template
        generateName: {{ include "kvisor.fullname" . }}-clickhouse
        spec:
          ports:
            - name: http
              port: 8123
              targetPort: 8123
            - name: native
              port: 9000
              targetPort: 9000
          type: ClusterIP
{{- end }}

{{/* ========================================================================= */}}
{{/* ClickHouse Schema Migration Job                                           */}}
{{/* ========================================================================= */}}
{{/* Runs when install.enabled=true OR migrate.enabled=true                    */}}
{{- if or (dig "install" "enabled" false .Values.clickhouse) (dig "migrate" "enabled" false .Values.clickhouse) }}
---
# ─────────────────────────────────────────────────────────────────────────────
# ClickHouse Schema Migration Job
# ─────────────────────────────────────────────────────────────────────────────
# Runs goose migrations to create Bronze/Silver/Gold OTEL schema.
# Uses Helm hook to run after ClickHouse is installed.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kvisor.fullname" . }}-clickhouse-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kvisor.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse-migrate
  annotations:
    # Run after install/upgrade, delete before next upgrade
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kvisor.fullname" . }}-clickhouse-migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: clickhouse-migrate
        {{- include "kvisor.commonLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.clickhouse.migrate.image.repository }}:{{ .Values.clickhouse.migrate.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.clickhouse.migrate.image.pullPolicy }}
          args:
            - "--clickhouse-addr={{ include "kvisor.clickhouse.address" . }}"
            - "--clickhouse-database={{ include "kvisor.clickhouse.database" . }}"
            - "--clickhouse-username={{ include "kvisor.clickhouse.username" . }}"
            - "up"
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if (dig "install" "enabled" false .Values.clickhouse) }}
                  name: {{ include "kvisor.fullname" . }}-clickhouse-credentials
                  {{- else }}
                  name: {{ include "kvisor.fullname" . }}-otel-clickhouse-credentials
                  {{- end }}
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
{{- end }}
