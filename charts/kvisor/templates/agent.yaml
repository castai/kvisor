{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "kvisor.agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kvisor.agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "kvisor.agent.selectorLabels" . | nindent 6 }}
  {{- with .Values.agent.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      {{- if (dig "reliabilityMetrics" "enabled" false .Values.agent) }}
        checksum/obi-config: {{ include (print $.Template.BasePath "/obi-config.yaml") . | sha256sum }}
      {{- end }}
      {{- if .Values.agent.prometheusScrape.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.agent.metricsHTTPListenPort }}"
      {{- end }}
      {{- if .Values.pyroscope.enabled }}
        phlare.grafana.com/scrape: "true"
        phlare.grafana.com/port: "{{ .Values.agent.metricsHTTPListenPort }}"
        profiles.grafana.com/memory.scrape: "true"
        profiles.grafana.com/memory.port: "{{ .Values.agent.metricsHTTPListenPort }}"
        profiles.grafana.com/cpu.scrape: "true"
        profiles.grafana.com/cpu.port: "{{ .Values.agent.metricsHTTPListenPort }}"
        profiles.grafana.com/goroutine.scrape: "true"
        profiles.grafana.com/goroutine.port: "{{ .Values.agent.metricsHTTPListenPort }}"
      {{- end }}
        container.apparmor.security.beta.kubernetes.io/kvisor: unconfined
      {{- if (dig "reliabilityMetrics" "enabled" false .Values.agent) }}
        container.apparmor.security.beta.kubernetes.io/obi: unconfined
      {{- end }}
      {{- with .Values.agent.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kvisor.agent.selectorLabels" . | nindent 8 }}
        {{- include "kvisor.commonLabels" . | nindent 8 }}
        {{- with .Values.agent.podLabels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kvisor.agent.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.agent.automountServiceAccountToken }}
      hostPID: true
      securityContext:
        {{- toYaml .Values.agent.securityContext | nindent 8 }}
      priorityClassName: {{ .Values.agent.priorityClass }}
      {{- if or (include "kvisor.gpuEnabled" .) (dig "reliabilityMetrics" "enabled" false .Values.agent) }}
      initContainers:
      {{- if (include "kvisor.gpuEnabled" .) }}
        - name: gpu-feature-discovery
          image: "{{ .Values.image.repository }}-agent:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "/usr/local/bin/kvisor-agent"
          args:
            - "feature-discovery"
            - "--output-dir={{ .Values.agent.gpu.sharedDir }}"
            - "--self-daemonset-name={{ include "kvisor.agent.fullname" . }}"
            - "--self-namespace={{ .Release.Namespace }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: gpu-shared
              mountPath: {{ .Values.agent.gpu.sharedDir }}
            - name: gpu-sa-token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
      {{- end }}
      {{- if (dig "reliabilityMetrics" "enabled" false .Values.agent) }}
        {{- include "kvisor.obi.initContainer" . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
        - name: kvisor
          securityContext:
            {{- include "kvisor.agent.containerSecurityContext" . | nindent 12 }}
          image: "{{ .Values.image.repository }}-agent:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          command:
            - "/usr/local/bin/kvisor-agent"
          args:
            - "run"
            - "--metrics-http-listen-port={{.Values.agent.metricsHTTPListenPort}}"
            - "--disable-containerd={{ .Values.agent.disableContainerd }}"
          {{- if eq .Values.mockServer.enabled true }}
            - "--castai-server-insecure=true"
          {{- end }}
          {{- if .Values.clickhouse.enabled }}
            - "--clickhouse-addr={{ include "kvisor.clickhouse.fullname" . }}.{{ .Release.Namespace}}:9000"
            - "--clickhouse-database={{.Values.clickhouse.auth.database}}"
            - "--clickhouse-username={{.Values.clickhouse.auth.username}}"
          {{- end }}
            - "--kube-api-service-addr={{ include "kvisor.controller.fullname" .}}.{{.Release.Namespace}}:{{ .Values.controller.kubeAPIListenPort }}"
          {{- range $key, $value := .Values.agent.extraArgs }}
            - "--{{ $key }}={{ $value }}"
          {{- end }}
          {{- if (include "kvisor.gpuEnabled" .) }}
            - "--gpu-enabled=true"
            - "--gpu-export-interval={{ .Values.agent.gpu.exportInterval }}"
            - "--gpu-dcgm-port={{ .Values.agent.gpu.dcgmExporter.port }}"
            - "--gpu-shared-dir={{ .Values.agent.gpu.sharedDir }}"
          {{- end }}
          envFrom:
          {{- with .Values.agent.envFrom }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.castai.enabled }}
          {{- include "kvisor.apiKeyEnvFrom" (set (deepCopy .) "envFrom" .Values.agent.envFrom) | nindent 12 }}
          {{- end }}
          {{- if .Values.clickhouse.enabled }}
            - secretRef:
                name:  {{ include "kvisor.clickhouse.fullname" . }}
          {{- end }}
          env:
            {{- include "GOMEMLIMITEnv" .Values.agent.resources.limits.memory | nindent 12 }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CASTAI_API_GRPC_ADDR
              value: {{ if .Values.mockServer.enabled -}}
                       {{ (printf "%s:8443" (include "kvisor.castaiMockServer.service" .)) | quote }}
                     {{- else -}}
                       {{ .Values.castai.grpcAddr | quote }}
                     {{- end }}
            - name: CASTAI_API_URL
              value: {{ if .Values.mockServer.enabled -}}
                       {{ (printf "http://%s:8080" (include "kvisor.castaiMockServer.service" .)) | quote }}
                     {{- else -}}
                       {{ include "kvisor.apiURL" . | quote }}
                     {{- end }}
          {{- include "kvisor.clusterIDEnv" (set (deepCopy .) "envFrom" .Values.agent.envFrom) | nindent 12 }}
          {{- if .Values.agent.debug.ebpf }}
            - name: KVISOR_EBPF_DEBUG
              value: "1"
          {{- end }}
          {{- range $k, $v := .Values.agent.additionalEnv }}
            - name: {{ $k }}
              value: "{{ $v }}"
          {{- end }}
          ports:
            - containerPort: {{.Values.agent.metricsHTTPListenPort}}
              name: metrics
              protocol: TCP
          livenessProbe:
            httpGet:
              port: metrics
              path: /healthz
            periodSeconds: 5
          readinessProbe:
            httpGet:
              port: metrics
              path: /healthz
            periodSeconds: 5
          startupProbe:
            httpGet:
              port: metrics
              path: /healthz
            failureThreshold: 12
            periodSeconds: 10
          volumeMounts:
            - name: cgroups
              mountPath: /cgroups
              readOnly: true
            - mountPath: /cgroup2-manual-mount
              name: cgroup-mountdir
            - name: etc-os-release
              mountPath: /etc/os-release-host
              readOnly: true
            - name: debugfs
              mountPath: /sys/kernel/debug
            - name: containerd-sock
              mountPath: /run/containerd/containerd.sock
              readOnly: true
            {{- with .Values.agent.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if (include "kvisor.gpuEnabled" .) }}
            - name: gpu-shared
              mountPath: {{ .Values.agent.gpu.sharedDir }}
            {{- end }}
      {{- if (dig "reliabilityMetrics" "enabled" false .Values.agent) }}
        - name: obi
          image: "{{ .Values.agent.reliabilityMetrics.obi.image.repository }}:{{ .Values.agent.reliabilityMetrics.obi.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/shared/entrypoint.sh"]
          securityContext:
            {{- include "kvisor.obi.containerSecurityContext" . | nindent 12 }}
          resources:
            {{- include "kvisor.obi.profileResources" .Values.agent.reliabilityMetrics.obi | nindent 12 }}
          env:
          {{- $obiExclude := .Values.agent.reliabilityMetrics.obi.exclude | default list }}
          {{- $obiExcludeProfilers := .Values.agent.reliabilityMetrics.obi.excludeProfilerEndpoints | default false }}
          {{- $obiIgnoredRoutes := .Values.agent.reliabilityMetrics.obi.ignoredRoutes | default list }}
          {{- $obiHasConfig := or (gt (len $obiExclude) 0) $obiExcludeProfilers (gt (len $obiIgnoredRoutes) 0) }}
          {{- if $obiHasConfig }}
            - name: OTEL_EBPF_CONFIG_PATH
              value: /etc/obi/obi-config.yaml
          {{- end }}
            - name: OBI_MEMORY_LIMIT_BYTES
              valueFrom:
                resourceFieldRef:
                  containerName: obi
                  resource: limits.memory
            - name: OTEL_EBPF_OPEN_PORT
              value: {{ .Values.agent.reliabilityMetrics.obi.openPorts | quote }}
          {{- if (dig "reliabilityMetrics" "collector" "enabled" false .Values.agent) }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://localhost:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
          {{- end }}
            - name: OTEL_EBPF_KUBE_METADATA_ENABLE
              value: "autodetect"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          {{- if (dig "reliabilityMetrics" "obi" "internalMetrics" "enabled" false .Values.agent) }}
            - name: OTEL_EBPF_INTERNAL_METRICS_EXPORTER
              value: "prometheus"
            - name: OTEL_EBPF_INTERNAL_METRICS_PROMETHEUS_PORT
              value: {{ .Values.agent.reliabilityMetrics.obi.internalMetrics.port | default 6061 | quote }}
            {{- with (dig "reliabilityMetrics" "obi" "internalMetrics" "path" "" .Values.agent) }}
            - name: OTEL_EBPF_INTERNAL_METRICS_PROMETHEUS_PATH
              value: {{ . | quote }}
            {{- end }}
          {{- end }}
          {{- range $k, $v := .Values.agent.reliabilityMetrics.obi.env }}
            - name: {{ $k }}
              value: "{{ $v }}"
          {{- end }}
          {{- if (dig "reliabilityMetrics" "obi" "internalMetrics" "enabled" false .Values.agent) }}
          ports:
            - containerPort: {{ .Values.agent.reliabilityMetrics.obi.internalMetrics.port | default 6061 }}
              name: obi-metrics
              protocol: TCP
          {{- end }}
          volumeMounts:
            - name: obi-shared
              mountPath: /shared
              readOnly: true
            - name: var-run-obi
              mountPath: /var/run/beyla
            - name: cgroups
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: obi-sa-token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
          {{- if $obiHasConfig }}
            - name: obi-config
              mountPath: /etc/obi
              readOnly: true
          {{- end }}
      {{- if (dig "reliabilityMetrics" "collector" "enabled" false .Values.agent) }}
        - name: otel-collector
          image: "{{ .Values.agent.reliabilityMetrics.collector.image.repository }}:{{ .Values.agent.reliabilityMetrics.collector.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsUser: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.agent.reliabilityMetrics.collector.resources | nindent 12 }}
          env:
            {{- include "GOMEMLIMITEnv" .Values.agent.reliabilityMetrics.collector.resources.limits.memory | nindent 12 }}
            {{- include "MemoryLimiterEnv" .Values.agent.reliabilityMetrics.collector.resources.limits.memory | nindent 12 }}
            - name: API_URL
              value: {{ if .Values.mockServer.enabled -}}
                   {{ (printf "http://%s:8080" (include "kvisor.castaiMockServer.service" .)) | quote }}
                 {{- else -}}
                   {{ include "kvisor.apiURL" . | quote }}
                 {{- end }}
            {{- include "kvisor.clusterIDEnv" (set (deepCopy .) "envFrom" .Values.agent.envFrom) | nindent 12 }}
            {{- if (dig "reliabilityMetrics" "collector" "clickhouseExporter" "enabled" false .Values.agent) }}
            - name: CLICKHOUSE_ENABLED
              value: "true"
            - name: COLLECTOR_MODE
              value: "daemonset"
            - name: CLICKHOUSE_ADDR
              {{- if .Values.agent.reliabilityMetrics.collector.clickhouseExporter.address }}
              value: {{ .Values.agent.reliabilityMetrics.collector.clickhouseExporter.address | quote }}
              {{- else }}
              value: {{ include "kvisor.reliabilityMetrics.clickhouse.address" . | quote }}
              {{- end }}
            - name: CLICKHOUSE_DATABASE
              value: {{ include "kvisor.reliabilityMetrics.clickhouse.database" . | quote }}
            - name: CLICKHOUSE_USERNAME
              {{- include "kvisor.reliabilityMetrics.clickhouse.username" . | nindent 14 }}
            - name: CLICKHOUSE_PASSWORD
              {{- include "kvisor.reliabilityMetrics.clickhouse.password" . | nindent 14 }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- end }}
          envFrom:
          {{- include "kvisor.apiKeyEnvFrom" (set (deepCopy .) "envFrom" .Values.agent.envFrom) | nindent 12 }}
          ports:
            - containerPort: {{ .Values.agent.reliabilityMetrics.collector.prometheusPort }}
              name: otel-prom
              protocol: TCP
            - containerPort: 4317
              name: otlp-grpc
              protocol: TCP
            - containerPort: 4318
              name: otlp-http
              protocol: TCP
            - containerPort: 8888
              name: otel-metrics
              protocol: TCP
          livenessProbe:
            httpGet:
              port: 13133
              path: /
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              port: 13133
              path: /
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: obi-sa-token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
      {{- end }}
      {{- end }}
      {{- if (include "kvisor.gpuEnabled" .) }}
        {{- $provider := include "kvisor.cloudProvider" . }}
        - name: dcgm-exporter
          image: "{{ .Values.agent.gpu.dcgmExporter.image.repository }}:{{ .Values.agent.gpu.dcgmExporter.image.tag }}"
          imagePullPolicy: {{ .Values.agent.gpu.dcgmExporter.image.pullPolicy }}
          securityContext:
            privileged: {{ eq $provider "gke" }}
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - SYS_ADMIN
              drop:
                - NET_RAW
          resources:
            {{- toYaml .Values.agent.gpu.dcgmExporter.resources | nindent 12 }}
          command:
            - "/bin/bash"
            - "-c"
          args:
            - |
              if [ "$(cat {{ .Values.agent.gpu.sharedDir }}/dcgm-exists 2>/dev/null)" = "true" ] || \
                 [ "$(cat {{ .Values.agent.gpu.sharedDir }}/gpu-metrics-exporter-exists 2>/dev/null)" = "true" ]; then
                echo "Existing DCGM exporter or gpu-metrics-exporter found on node. Standing by."
                while true; do sleep 3600; done
              fi
              {{- if eq $provider "gke" }}
              # Wait for GKE NVIDIA driver installation (cos-nvidia-installer runs asynchronously).
              # 30s timeout handles CPU-only nodes where drivers will never appear.
              elapsed=0
              while [ $elapsed -lt 30 ]; do
                if ls "/usr/local/nvidia/lib64/libnvidia-ml.so.1" &>/dev/null; then
                  echo "nvml drivers found"
                  break
                fi
                echo "waiting for nvml drivers ($elapsed/30s)"
                sleep 1
                elapsed=$((elapsed + 1))
              done
              if ! ls "/usr/local/nvidia/lib64/libnvidia-ml.so.1" &>/dev/null; then
                echo "nvml drivers not found after 30s (CPU-only node). Standing by."
                while true; do sleep 3600; done
              fi
              hostname $NODE_NAME; exec dcgm-exporter -f /etc/dcgm-exporter/counters.csv
              {{- else }}
              hostname $NODE_NAME
              max_retries=10
              attempt=0
              while [ $attempt -lt $max_retries ]; do
                dcgm-exporter -f /etc/dcgm-exporter/counters.csv
                attempt=$((attempt + 1))
                echo "dcgm-exporter exited (no GPU or driver not ready). Retry $attempt/$max_retries in 60s."
                sleep 60
              done
              echo "dcgm-exporter failed after $max_retries attempts. Standing by."
              while true; do sleep 3600; done
              {{- end }}
          ports:
            - name: dcgm-metrics
              containerPort: {{ .Values.agent.gpu.dcgmExporter.port }}
              protocol: TCP
          env:
            - name: DCGM_EXPORTER_KUBERNETES
              value: "true"
            - name: DCGM_EXPORTER_LISTEN
              value: ":{{ .Values.agent.gpu.dcgmExporter.port }}"
            - name: DCGM_EXPORTER_INTERVAL
              value: "5000"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if eq $provider "gke" }}
            - name: DCGM_EXPORTER_KUBERNETES_GPU_ID_TYPE
              value: "device-name"
            - name: DISABLE_STARTUP_VALIDATE
              value: "true"
            {{- end }}
          volumeMounts:
            - name: gpu-shared
              mountPath: {{ .Values.agent.gpu.sharedDir }}
            - name: pod-gpu-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
            - name: dcgm-config
              mountPath: /etc/dcgm-exporter
              readOnly: true
            {{- if eq $provider "gke" }}
            - name: nvidia-install-dir-host
              mountPath: /usr/local/nvidia
              readOnly: true
            {{- end }}
      {{- end }}
      dnsPolicy: {{.Values.agent.dnsPolicy}}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with include "kvisor.tolerations" (dict "componentTolerations" .Values.agent.tolerations "Values" .Values) }}
      tolerations:
        {{- . | nindent 8 }}
      {{- end }}
      # TODO: Since we run with hostPID these volumes could be removed and accessed via `/proc/1/root` prefix.
      volumes:
        - name: etc-os-release
          hostPath:
            path: /etc/os-release
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
        - name: cgroups
          hostPath:
            path: /sys/fs/cgroup
        - name: cgroup-mountdir
          emptyDir: {}
        - name: containerd-sock
          hostPath:
            path: {{ .Values.agent.containerdSocketPath }}
            type: Socket
      {{- if (dig "reliabilityMetrics" "enabled" false .Values.agent) }}
        - name: var-run-obi
          emptyDir: {}
        - name: obi-shared
          emptyDir:
            sizeLimit: 2Mi
      {{- $obiExcludeVol := .Values.agent.reliabilityMetrics.obi.exclude | default list }}
      {{- $obiExcludeProfilersVol := .Values.agent.reliabilityMetrics.obi.excludeProfilerEndpoints | default false }}
      {{- $obiIgnoredRoutesVol := .Values.agent.reliabilityMetrics.obi.ignoredRoutes | default list }}
      {{- if or (gt (len $obiExcludeVol) 0) $obiExcludeProfilersVol (gt (len $obiIgnoredRoutesVol) 0) }}
        - name: obi-config
          configMap:
            name: {{ include "kvisor.agent.fullname" . }}-obi-config
      {{- end }}
        # Projected SA token for OBI — enables K8s metadata decoration
        # (namespace, pod, deployment labels) without setting
        # automountServiceAccountToken=true for the entire pod.
        - name: obi-sa-token
          projected:
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3600
                  path: token
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
      {{- end }}
      {{- if (include "kvisor.gpuEnabled" .) }}
        - name: gpu-shared
          emptyDir: {}
        - name: pod-gpu-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources
        - name: dcgm-config
          configMap:
            name: {{ include "kvisor.agent.fullname" . }}-dcgm-config
        {{- if eq (include "kvisor.cloudProvider" .) "gke" }}
        - name: nvidia-install-dir-host
          hostPath:
            path: /home/kubernetes/bin/nvidia
            type: DirectoryOrCreate
        {{- end }}
        - name: gpu-sa-token
          projected:
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3600
                  path: token
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
      {{- end }}
        {{- with .Values.agent.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
---
{{- if .Values.agent.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kvisor.agent.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kvisor.labels" . | nindent 4}}
  {{- with .Values.agent.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kvisor.fullname" . }}
  labels:
    {{- include "kvisor.labels" . | nindent 4}}
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - nodes
      - services
    verbs:
      - get
      - list
      - watch
  {{- if (include "kvisor.gpuEnabled" .) }}
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - list
  {{- end }}
  - apiGroups:
      - "apps"
    resources:
      - deployments
      - replicasets
      - daemonsets
      - statefulsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - "batch"
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch
  {{- if .Values.agent.openshift.scc.create }}
  - apiGroups:
      - "security.openshift.io"
    resources:
      - securitycontextconstraints
    resourceNames:
      - {{ include "kvisor.agent.fullname" . }}-scc
    verbs:
      - use
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kvisor.fullname" . }}
  labels:
    {{- include "kvisor.labels" . | nindent 4}}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kvisor.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kvisor.agent.serviceAccountName" . }}
    namespace: {{.Release.Namespace}}
---
{{ if not (empty .Values.agent.priorityClass) }}
apiVersion: v1
kind: ResourceQuota
metadata:
  name: {{ include "kvisor.agent.fullname" . }}-critical-pods
  namespace: {{ .Release.Namespace }}
spec:
  scopeSelector:
    matchExpressions:
      - operator: In
        scopeName: PriorityClass
        values:
          - {{ .Values.agent.priorityClass }}
{{- end }}
{{- end }}
