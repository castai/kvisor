# ─────────────────────────────────────────────────────────────────────────────
# Reliability Metrics (subchart: reliability-metrics)
# ─────────────────────────────────────────────────────────────────────────────
# Components: in-cluster-clickhouse, schema-migration, exporter
reliabilityMetrics:
  enabled: true
  # CAST AI credentials for the exporter
  castai:
    apiKeySecretRef: "castai-kvisor" # Read API key from castai-kvisor Secret
    clusterIdConfigMapRef:
      name: "castai-agent-metadata" # Read cluster ID from castai-agent-metadata ConfigMap
      key: "CLUSTER_ID"
    grpcAddr: "telemetry.dev-master.cast.ai:443"
  # In-cluster ClickHouse (Altinity operator)
  operator:
    enabled: true
  install:
    enabled: true
    resources:
      requests:
        cpu: 500m
        memory: 4Gi
      limits:
        memory: 8Gi
    persistence:
      size: 50Gi
  auth:
    database: "metrics"
    username: "kvisor"
    password: "kvisor"
  # Exporter (exports metrics from ClickHouse to CAST AI)
  # Also used for schema migrations (migrate is a subcommand)
  exporter:
    enabled: true
    image:
      repository: us-docker.pkg.dev/castai-hub/library/reliability-metrics-ch-exporter
      tag: "v0.3.0"
    grpcAddr: "telemetry.dev-master.cast.ai:443"

agent:
  reliabilityMetrics:
    enabled: true
    image:
      repository: otel/ebpf-instrument
      tag: "v0.5.0"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 1Gi
    openPorts: "80,443,8080,8443,8090,6379"
    env:
      # Disable tracing - we only need metrics
      OTEL_TRACES_SAMPLER: "always_off"
      OTEL_EBPF_TRACE_PRINTER: "disabled"
      # Increase internal Go channel buffer from default 10 to 500.
      # Fixes "subscriber channel is taking too long to respond" warnings
      # that cause span drops and metric under-counting on busy nodes.
      OTEL_EBPF_CHANNEL_BUFFER_LEN: "500"
      # Reduce metrics export interval from default 60s to 15s.
      # Flushes histogram aggregations 4x more often, reducing backpressure
      # on the spanNameAggregatedMetrics pipeline stage.
      OTEL_EBPF_METRICS_INTERVAL: "15s"
      # Send eBPF events immediately instead of batching — reduces burst
      # size hitting the Go pipeline during high-throughput periods.
      OTEL_EBPF_BPF_HIGH_REQUEST_VOLUME: "true"
    containerSecurityContext: {}
    collector:
      enabled: true
      clickhouseExporter:
        enabled: true
        address: "tcp://castai-kvisor-clickhouse.castai-agent.svc.cluster.local:9000"
      image:
        repository: us-docker.pkg.dev/castai-hub/library/reliability-metrics-otel-collector
        tag: "v0.0.6"
      resources:
        requests:
          memory: 64Mi
        limits:
          memory: 128Mi
      prometheusPort: 9400
      podMonitorEnabled: false

controller:
  reliabilityMetrics:
    enabled: true
    collector:
      enabled: true
      clickhouseExporter:
        enabled: true
        address: "tcp://castai-kvisor-clickhouse.castai-agent.svc.cluster.local:9000"
      image:
        repository: us-docker.pkg.dev/castai-hub/library/reliability-metrics-otel-collector
        tag: "v0.0.6"
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
      prometheusPort: 9401
      podMonitorEnabled: false
