clickhouse:
  operator:
    enabled: true
  install:
    enabled: true
    resources:
      requests:
        cpu: 500m
        memory: 4Gi
      limits:
        memory: 8Gi
    persistence:
      size: 50Gi
  auth:
    database: "metrics"
    username: "kvisor"
    password: "kvisor"
  exporter:
    enabled: true
    image:
      repository: eu.gcr.io/engineering-test-353509/reliability-metrics-ch-exporter
      tag: "v0.12-subquery"
    grpcAddr: "telemetry.dev-master.cast.ai:443"
  migrate:
    image:
      repository: eu.gcr.io/engineering-test-353509/kvisor-clickhouse-migrate
      tag: "v8-histogram-amd64"

agent:
  reliabilityMetrics:
    enabled: true
    image:
      repository: otel/ebpf-instrument
      tag: "main"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 1Gi
    openPorts: "80,443,8080,8443,8090,6379"
    env:
      # Increase internal Go channel buffer from default 10 to 500.
      # Fixes "subscriber channel is taking too long to respond" warnings
      # that cause span drops and metric under-counting on busy nodes.
      OTEL_EBPF_CHANNEL_BUFFER_LEN: "500"
      # Reduce metrics export interval from default 60s to 15s.
      # Flushes histogram aggregations 4x more often, reducing backpressure
      # on the spanNameAggregatedMetrics pipeline stage.
      OTEL_EBPF_METRICS_INTERVAL: "15s"
      # Send eBPF events immediately instead of batching — reduces burst
      # size hitting the Go pipeline during high-throughput periods.
      OTEL_EBPF_BPF_HIGH_REQUEST_VOLUME: "true"
    containerSecurityContext: {}
    collector:
      enabled: true
      clickhouseExporter:
        enabled: true
      image:
        repository: otel/opentelemetry-collector-contrib
        tag: "0.145.0"
      resources:
        requests:
          memory: 64Mi
        limits:
          memory: 128Mi
      prometheusPort: 9400
      podMonitorEnabled: false

controller:
  reliabilityMetrics:
    enabled: true
    collector:
      enabled: true
      clickhouseExporter:
        enabled: true
      image:
        repository: otel/opentelemetry-collector-contrib
        tag: "0.145.0"
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
      prometheusPort: 9401
      podMonitorEnabled: false
