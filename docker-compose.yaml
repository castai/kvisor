version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.6.4.12-alpine@sha256:6a935b5e87a13435b3906c242aa84caf595f43b6b3fbb3ca202c0195b29c5ced
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
