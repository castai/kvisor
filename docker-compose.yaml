version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.12.5.81-alpine@sha256:1ada60b6c12361792755878ff92e1c3423941a79396c10d769609ada9e833de7
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
