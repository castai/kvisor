version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.5.2.47-alpine@sha256:84155a247c37832b1611592de2a52b91bc4d4762ed6f5dfd0bc91322b608cf43
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
