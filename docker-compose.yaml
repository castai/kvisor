version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.9.2.1-alpine@sha256:e9a556c337313d13eb790034a313ab7658eea965198ea0c7bcb0b2bb90b5c4ee
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
