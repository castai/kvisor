version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.4.4.25-alpine@sha256:d73369204a54d1fd5cb7c1d3f03de71152e646c7a061457fe5730e4726297e4b
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
