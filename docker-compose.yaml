version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.6.3.116-alpine@sha256:805e1d8ecf2ad4e215103befad88ba1d4ea05b9f895f84a229043280e808af2a
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
