version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.2.4.23-alpine@sha256:eceaad1ce4381e05aeb9560b8c6283b8e6dd387cf72b835f7904a35326ad441c
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
