version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.5.1.2782-alpine@sha256:4ac5e4d6acf3230e5b33d723dd233ceaf9393a13552e6598aaf62d4397c3148b
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
