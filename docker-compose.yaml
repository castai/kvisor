version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.1.2.11-alpine@sha256:7e83cd8f04fe9705ce28f71ae394e2c89a51d9e9ea92467582712c2893256b94
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
