version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.8.2.29-alpine@sha256:37fd96436c3efe163fd087ab2ecdb29e2f9e3a2ffa38d0353c052b4e864a8579
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
