version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.12.5.44-alpine@sha256:46e2bf9cb9ecf53985682852910041b53ff3f75553cfbacc36b7764f479911a6
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
