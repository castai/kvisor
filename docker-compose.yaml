version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.12.8.9-alpine@sha256:f6200b2d040ae9af6b289bc1d10f2bddff7df97e77319d706953f7aa15751dfe
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
