version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.5.3.75-alpine@sha256:203dfe00a9fb49240182b6fd1926a482e842edd4e401e6f662b35fe752528aff
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
