version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.7.2.54-alpine@sha256:1e749e87ee3b83bd73fac4ee6ebb7126f841cedf61b77708d88435fc4f427199
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
