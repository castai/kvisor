version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.11.2.24-alpine@sha256:613412efa6a8c2a55fd3f62741e496d9023fe6468052c9c7fa7d8c683cae02c0
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
