version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.8.4.13-alpine@sha256:221fed009167c402186875d8dd8b0f4972e97448b9f5aaf6866fb439ff9b8045
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
