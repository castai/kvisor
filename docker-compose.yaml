version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.6.2.5-alpine@sha256:b628905178fbdb62c523b5c4fc8562acf956b008b64f3060433558d59ffd9a59
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
