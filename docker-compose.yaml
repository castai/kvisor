version: '3.8'
services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.12.10.7-alpine@sha256:10d4a2f073cbcabd434fb3f78a616d015b19c79f4bca3b11f536b28c8f90441d
    restart: always
    environment:
      - CLICKHOUSE_USER=storage
      - CLICKHOUSE_PASSWORD=storage
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse:/var/lib/clickhouse/

volumes:
  db:
    driver: local
  clickhouse:
    driver: local
